<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任務獎勵與審核系統 - 雲端連線版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (使用 Compat 版本以確保單檔執行環境穩定) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .cloud-active { animation: pulseCloud 2s infinite; }
        @keyframes pulseCloud { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Firebase 設定資訊 (已填入你提供的金鑰)
        const firebaseConfig = {
            apiKey: "AIzaSyAPvfBNFtj4FEtMlF-fnn9oet5iGMi0z-w",
            authDomain: "normal-life-f46f8.firebaseapp.com",
            projectId: "normal-life-f46f8",
            storageBucket: "normal-life-f46f8.firebasestorage.app",
            messagingSenderId: "1039652755711",
            appId: "1:1039652755711:web:22ca73482a0aa3ba2e54ca",
            measurementId: "G-407NP2B0BM"
        };

        // 初始化 Firebase Firestore
        let db;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            // 啟用離線支持 (可選)
            db.settings({ experimentalForceLongPolling: true });
        } catch (e) {
            console.error("Firebase 初始化失敗:", e);
        }

        const { useState, useEffect, useMemo } = React;

        // SVG 圖標組件
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                'user': <g><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></g>,
                'shield-check': <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /><path d="m9 12 2 2 4-4" /></g>,
                'coins': <g><circle cx="8" cy="8" r="6" /><path d="M18.09 10.37A6 6 0 1 1 10.34 18" /><path d="M7 6h1v4" /><path d="m16.71 13.88.7.71-2.82 2.82" /></g>,
                'trophy': <g><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><circle cx="12" cy="8" r="4" /></g>,
                'shopping-bag': <g><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" /><path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" /></g>,
                'clock': <g><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></g>,
                'check-circle': <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></g>,
                'x-circle': <g><circle cx="12" cy="12" r="10" /><line x1="15" y1="9" x2="9" y2="15" /><line x1="9" y1="9" x2="15" y2="15" /></g>,
                'trash-2': <g><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></g>,
                'lock': <g><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></g>,
                'loader-2': <path d="M21 12a9 9 0 1 1-6.21-8.58" />,
                'check': <polyline points="20 6 9 17 4 12" />,
                'x': <g><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></g>,
                'clipboard-check': <g><rect width="8" height="4" x="8" y="2" rx="1" ry="1" /><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><path d="m9 14 2 2 4-4" /></g>,
                'cloud': <g><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" /></g>
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} ${name === 'loader-2' ? 'animate-spin' : ''}`}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const INITIAL_STATE = {
            coins: 100,
            missions: [
                { id: 1, title: '慢跑 30 分鐘', value: 30, type: 'earn' },
                { id: 2, title: '閱讀一章節', value: 20, type: 'earn' }
            ],
            rewards: [
                { id: 101, title: '看一集 Netflix', value: 50, type: 'spend' }
            ],
            logs: []
        };

        const App = () => {
            const [role, setRole] = useState('user'); 
            const [activeTab, setActiveTab] = useState('tasks');
            const [coins, setCoins] = useState(0);
            const [missions, setMissions] = useState([]);
            const [rewards, setRewards] = useState([]);
            const [logs, setLogs] = useState([]);
            
            const [newItemName, setNewItemName] = useState('');
            const [newItemValue, setNewItemValue] = useState('');
            const [showAddForm, setShowAddForm] = useState(false);
            const [isVerifying, setIsVerifying] = useState(false);
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [isCloudReady, setIsCloudReady] = useState(false);

            const ADMIN_PASSWORD = "8888";

            // 初始化與雲端同步
            useEffect(() => {
                const savedRole = localStorage.getItem('app_role');
                if (savedRole) {
                    setRole(savedRole);
                    setActiveTab(savedRole === 'admin' ? 'review' : 'tasks');
                }

                if (db) {
                    const docRef = db.collection('app_data').doc('shared');
                    const unsubscribe = docRef.onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            setCoins(data.coins ?? 0);
                            setMissions(data.missions ?? []);
                            setRewards(data.rewards ?? []);
                            setLogs(data.logs ?? []);
                            setIsCloudReady(true);
                        } else {
                            // 資料庫為空時初始化
                            docRef.set(INITIAL_STATE).then(() => setIsCloudReady(true));
                        }
                    }, err => {
                        console.error("Firestore 監聽失敗:", err);
                        setIsCloudReady(false);
                    });
                    return () => unsubscribe();
                }
            }, []);

            // 雲端更新輔助函數
            const updateCloud = (updates) => {
                if (db) {
                    db.collection('app_data').doc('shared').update(updates)
                      .catch(e => console.error("雲端更新失敗:", e));
                }
            };

            const performSwitch = (newRole) => {
                setIsVerifying(true);
                setTimeout(() => {
                    setRole(newRole);
                    setActiveTab(newRole === 'user' ? 'tasks' : 'review');
                    localStorage.setItem('app_role', newRole);
                    setIsVerifying(false);
                }, 500);
            };

            const verifyPassword = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setShowPasswordModal(false);
                    setPasswordInput('');
                    performSwitch('admin');
                } else {
                    alert('密碼錯誤！');
                    setPasswordInput('');
                }
            };

            const addItem = (e) => {
                e.preventDefault();
                const val = parseInt(newItemValue);
                if (!newItemName || isNaN(val)) return;
                const newItem = { id: Date.now(), title: newItemName, value: val, type: activeTab === 'tasks' ? 'earn' : 'spend' };
                
                if (activeTab === 'tasks') {
                    updateCloud({ missions: [...missions, newItem] });
                } else {
                    updateCloud({ rewards: [...rewards, newItem] });
                }
                setNewItemName(''); setNewItemValue(''); setShowAddForm(false);
            };

            const deleteItem = (id, type) => {
                if (type === 'earn') {
                    updateCloud({ missions: missions.filter(m => m.id !== id) });
                } else {
                    updateCloud({ rewards: rewards.filter(r => r.id !== id) });
                }
            };

            const submitRequest = (item) => {
                if (item.type === 'spend' && coins < item.value) {
                    alert('餘額不足！'); return;
                }
                const newLog = { ...item, logId: Date.now(), status: 'pending', timestamp: new Date().toLocaleString() };
                const updates = { logs: [newLog, ...logs] };
                if (item.type === 'earn') {
                    updates.missions = missions.filter(m => m.id !== item.id);
                } else {
                    updates.rewards = rewards.filter(r => r.id !== item.id);
                }
                updateCloud(updates);
            };

            const handleReview = (logId, action) => {
                const target = logs.find(l => l.logId === logId);
                if (!target) return;

                let newCoins = coins;
                let newMissions = [...missions];
                let newRewards = [...rewards];

                if (action === 'approve') {
                    newCoins = target.type === 'earn' ? coins + target.value : coins - target.value;
                } else {
                    const restored = { id: target.id, title: target.title, value: target.value, type: target.type };
                    if (target.type === 'earn') newMissions.push(restored);
                    else newRewards.push(restored);
                }
                
                const newLogs = logs.map(l => l.logId === logId ? { ...l, status: action === 'approve' ? 'approved' : 'rejected' } : l);
                updateCloud({ coins: newCoins, missions: newMissions, rewards: newRewards, logs: newLogs });
            };

            const pendingLogs = useMemo(() => logs.filter(l => l.status === 'pending'), [logs]);
            const historyLogs = useMemo(() => logs.filter(l => l.status !== 'pending'), [logs]);

            return (
                <div className="min-h-screen bg-slate-50 pb-32">
                    {/* 切換動畫遮罩 */}
                    {isVerifying && (
                        <div className="fixed inset-0 z-50 bg-slate-900 flex flex-col items-center justify-center text-white">
                            <Icon name="loader-2" className="w-12 h-12 text-indigo-400 mb-4" />
                            <p className="text-xl font-bold">同步連線中...</p>
                        </div>
                    )}

                    {/* 密碼驗證彈窗 */}
                    {showPasswordModal && (
                        <div className="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl text-center animate-in">
                                <Icon name="lock" className="w-12 h-12 text-indigo-600 mx-auto mb-4" />
                                <h2 className="text-xl font-bold mb-4">管理員驗證</h2>
                                <form onSubmit={verifyPassword}>
                                    <input type="password" autoFocus className="w-full bg-slate-100 rounded-xl py-3 text-center text-2xl font-black mb-4 outline-none focus:ring-2 focus:ring-indigo-500" value={passwordInput} onChange={(e)=>setPasswordInput(e.target.value)} maxLength={4} />
                                    <div className="flex gap-2">
                                        <button type="submit" className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">進入</button>
                                        <button type="button" onClick={()=>setShowPasswordModal(false)} className="px-4 text-slate-400 font-bold">取消</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 頂部標題列 */}
                    <header className="sticky top-0 z-20 bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className={`p-1.5 rounded-lg ${role === 'admin' ? 'bg-indigo-100' : 'bg-slate-100'}`}>
                                <Icon name={role === 'admin' ? 'shield-check' : 'user'} className={`w-5 h-5 ${role === 'admin' ? 'text-indigo-600' : 'text-slate-400'}`} />
                            </div>
                            <div>
                                <span className="font-bold text-slate-700 block leading-tight">{role === 'admin' ? '管理者' : '執行者'}</span>
                                <span className={`text-[10px] flex items-center gap-1 ${isCloudReady ? 'text-green-500' : 'text-slate-300'}`}>
                                    <Icon name="cloud" className={`w-3 h-3 ${isCloudReady ? 'cloud-active' : ''}`} /> {isCloudReady ? '雲端同步中' : '連線中...'}
                                </span>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 bg-amber-100 px-4 py-1.5 rounded-full border border-amber-200">
                            <Icon name="coins" className="w-4 h-4 text-amber-600" />
                            <span className="text-amber-700 font-black">{coins}</span>
                        </div>
                    </header>

                    {/* 主要內容區 */}
                    <main className="max-w-md mx-auto p-4 space-y-6">
                        <nav className="flex bg-slate-200 p-1 rounded-2xl">
                            {role === 'user' ? (
                                <>
                                    <button onClick={()=>setActiveTab('tasks')} className={`flex-1 py-2.5 rounded-xl font-bold text-xs transition-all ${activeTab==='tasks'?'bg-white text-blue-600 shadow-sm':'text-slate-500'}`}>任務</button>
                                    <button onClick={()=>setActiveTab('shop')} className={`flex-1 py-2.5 rounded-xl font-bold text-xs transition-all ${activeTab==='shop'?'bg-white text-purple-600 shadow-sm':'text-slate-500'}`}>兌換</button>
                                    <button onClick={()=>setActiveTab('status')} className={`flex-1 py-2.5 rounded-xl font-bold text-xs transition-all ${activeTab==='status'?'bg-white text-amber-600 shadow-sm':'text-slate-500'}`}>狀態</button>
                                </>
                            ) : (
                                <button className="flex-1 py-2.5 rounded-xl bg-white text-indigo-600 font-bold shadow-sm flex items-center justify-center gap-2 text-xs">
                                    <Icon name="clipboard-check" className="w-4 h-4" /> 待審核 ({pendingLogs.length})
                                </button>
                            )}
                        </nav>

                        {role === 'user' ? (
                            <div className="space-y-4">
                                {activeTab !== 'status' ? (
                                    <>
                                        {!showAddForm ? (
                                            <button onClick={()=>setShowAddForm(true)} className="w-full py-4 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 font-bold hover:bg-slate-100 transition-colors">+ 新增自訂內容</button>
                                        ) : (
                                            <form onSubmit={addItem} className="bg-white p-4 rounded-2xl shadow-sm border border-indigo-100 space-y-3 animate-in">
                                                <input type="text" placeholder="名稱" className="w-full bg-slate-50 p-3 rounded-xl outline-none" value={newItemName} onChange={(e)=>setNewItemName(e.target.value)} required />
                                                <input type="number" placeholder="金幣價值" className="w-full bg-slate-50 p-3 rounded-xl outline-none" value={newItemValue} onChange={(e)=>setNewItemValue(e.target.value)} required />
                                                <div className="flex gap-2">
                                                    <button type="submit" className="flex-1 bg-slate-900 text-white py-2 rounded-xl font-bold">確認新增</button>
                                                    <button type="button" onClick={()=>setShowAddForm(false)} className="px-4 text-slate-400 font-bold text-sm">取消</button>
                                                </div>
                                            </form>
                                        )}
                                        <div className="space-y-3">
                                            {(activeTab === 'tasks' ? missions : rewards).map(item => (
                                                <div key={item.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm animate-in hover:shadow-md transition-shadow">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`p-2.5 rounded-xl ${activeTab==='tasks'?'bg-blue-50 text-blue-500':'bg-purple-50 text-purple-500'}`}>
                                                            <Icon name={activeTab==='tasks'?'trophy':'shopping-bag'} />
                                                        </div>
                                                        <div>
                                                            <div className="font-bold text-slate-700">{item.title}</div>
                                                            <div className={`text-xs font-bold ${activeTab==='tasks'?'text-blue-500':'text-purple-500'}`}>{activeTab==='tasks'?'+':'-'}{item.value} 金幣</div>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-1 items-center">
                                                        <button onClick={()=>deleteItem(item.id, activeTab === 'tasks' ? 'earn' : 'spend')} className="p-2 text-slate-200 hover:text-red-400 transition-colors"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                        <button onClick={()=>submitRequest(item)} className={`px-4 py-2 rounded-xl text-xs font-bold text-white ${activeTab==='tasks'?'bg-blue-600':'bg-purple-600'}`}>申請</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-3 animate-in">
                                        {logs.length === 0 && <div className="text-center py-12 text-slate-300 font-bold">尚無紀錄</div>}
                                        {logs.map(log => (
                                            <div key={log.logId} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${log.status==='pending'?'bg-amber-50 text-amber-500':log.status==='approved'?'bg-green-50 text-green-500':'bg-red-50 text-red-500'}`}>
                                                        <Icon name={log.status==='pending'?'clock':log.status==='approved'?'check-circle':'x-circle'} />
                                                    </div>
                                                    <div>
                                                        <div className="font-bold text-slate-700 text-sm">{log.title}</div>
                                                        <div className="text-[10px] text-slate-400">{log.timestamp}</div>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <div className={`font-black text-sm ${log.type==='earn'?'text-blue-500':'text-purple-500'}`}>{log.type==='earn'?'+':'-'}{log.value}</div>
                                                    <div className={`text-[10px] font-bold ${log.status==='pending'?'text-amber-500':log.status==='approved'?'text-green-500':'text-red-500'}`}>
                                                        {log.status==='pending'?'審核中':log.status==='approved'?'已通過':'已駁回'}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in">
                                {pendingLogs.length === 0 && (
                                    <div className="text-center py-20">
                                        <Icon name="clipboard-check" className="w-16 h-16 text-slate-200 mx-auto mb-4" />
                                        <p className="text-slate-400 font-bold">目前沒有待處理的申請</p>
                                    </div>
                                )}
                                {pendingLogs.map(log => (
                                    <div key={log.logId} className="bg-white p-5 rounded-3xl shadow-lg border-t-4 border-amber-400 animate-in">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${log.type==='earn'?'bg-blue-100 text-blue-600':'bg-purple-100 text-purple-600'}`}>
                                                    {log.type==='earn' ? '任務申請' : '兌換申請'}
                                                </span>
                                                <div className="font-bold text-lg text-slate-800">{log.title}</div>
                                                <div className="text-[10px] text-slate-400">{log.timestamp}</div>
                                            </div>
                                            <div className={`text-2xl font-black ${log.type==='earn'?'text-blue-500':'text-purple-500'}`}>{log.type==='earn'?'+':'-'}{log.value}</div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={()=>handleReview(log.logId, 'approve')} className="flex-1 bg-green-500 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-green-600 transition-colors"><Icon name="check" />准許</button>
                                            <button onClick={()=>handleReview(log.logId, 'reject')} className="flex-1 bg-red-500 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-red-600 transition-colors"><Icon name="x" />駁回</button>
                                        </div>
                                    </div>
                                ))}
                                
                                {historyLogs.length > 0 && (
                                    <div className="space-y-3 mt-8">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest px-2">最近審核歷史</h3>
                                        <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
                                            {historyLogs.slice(0, 5).map(log => (
                                                <div key={log.logId} className="p-4 border-b border-slate-50 last:border-0 flex justify-between items-center">
                                                    <div className="flex items-center gap-3 text-xs">
                                                        <Icon name={log.status === 'approved' ? 'check-circle' : 'x-circle'} className={`w-4 h-4 ${log.status==='approved'?'text-green-500':'text-red-400'}`} />
                                                        <div>
                                                            <div className="font-bold text-slate-700">{log.title}</div>
                                                            <div className="text-[10px] text-slate-400">{log.status === 'approved' ? '核准' : '駁回'}於 {log.timestamp.split(' ')[1]}</div>
                                                        </div>
                                                    </div>
                                                    <div className={`font-black ${log.status === 'approved' ? (log.type === 'earn' ? 'text-blue-500' : 'text-purple-500') : 'text-slate-300 line-through'}`}>
                                                        {log.type === 'earn' ? '+' : '-'}{log.value}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* 底部導航欄 */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-4">
                        <div className={`p-4 rounded-3xl flex justify-between items-center shadow-2xl border backdrop-blur-md transition-colors ${role==='admin'?'bg-slate-900 border-slate-700 text-white':'bg-white/80 border-slate-200'}`}>
                            <div className="flex items-center gap-3">
                                <div className={`w-10 h-10 rounded-2xl flex items-center justify-center ${role==='admin'?'bg-indigo-500':'bg-slate-100 text-slate-400'}`}>
                                    <Icon name={role==='admin'?'shield-check':'user'} />
                                </div>
                                <div className="text-sm font-bold">{role==='admin'?'管理員模式':'一般模式'}</div>
                            </div>
                            <button onClick={()=>role==='user'?setShowPasswordModal(true):performSwitch('user')} className={`px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-wider transition-all ${role==='admin'?'bg-white text-slate-900 active:scale-95':'bg-indigo-600 text-white active:scale-95 shadow-lg shadow-indigo-200'}`}>
                                {role==='admin'?'登出管理員':'管理員登入'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
