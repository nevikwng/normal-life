<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>任務獎勵系統</title>
    <!-- 使用 CDN 確保在 GitHub Pages 環境能直接運行 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK Compat 版本 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .cloud-active { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyAPvfBNFtj4FEtMlF-fnn9oet5iGMi0z-w",
            authDomain: "normal-life-f46f8.firebaseapp.com",
            projectId: "normal-life-f46f8",
            storageBucket: "normal-life-f46f8.firebasestorage.app",
            messagingSenderId: "1039652755711",
            appId: "1:1039652755711:web:22ca73482a0aa3ba2e54ca",
            measurementId: "G-407NP2B0BM"
        };

        // 初始化 Firebase
        let db;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            // 修正：針對 GitHub Pages 的跨域存取優化
            db.settings({ experimentalForceLongPolling: true });
        } catch (e) {
            console.error("Firebase 初始化錯誤:", e);
        }

        const { useState, useEffect } = React;

        // 簡易圖標
        const Icon = ({ name, className = "w-5 h-5" }) => (
            <span className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
                {name === 'coins' && '💰'}
                {name === 'user' && '👤'}
                {name === 'admin' && '🔑'}
                {name === 'cloud' && '☁️'}
                {name === 'check' && '✅'}
                {name === 'x' && '❌'}
                {name === 'pending' && '⏳'}
            </span>
        );

        const App = () => {
            const [coins, setCoins] = useState(0);
            const [role, setRole] = useState('user'); // user 或 admin
            const [isOnline, setIsOnline] = useState(false);
            const [logs, setLogs] = useState([]);
            const [missions, setMissions] = useState([]);
            const [rewards, setRewards] = useState([]);
            const [activeTab, setActiveTab] = useState('tasks');

            // 實時監聽資料庫
            useEffect(() => {
                if (!db) return;
                const unsubscribe = db.collection('app_data').doc('shared').onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        setCoins(data.coins || 0);
                        setLogs(data.logs || []);
                        setMissions(data.missions || []);
                        setRewards(data.rewards || []);
                        setIsOnline(true);
                    } else {
                        // 初始化資料
                        db.collection('app_data').doc('shared').set({
                            coins: 100,
                            missions: [{ id: 1, title: '慢跑', value: 30, type: 'earn' }],
                            rewards: [{ id: 101, title: '手搖飲', value: 50, type: 'spend' }],
                            logs: []
                        });
                    }
                }, err => {
                    console.error("監聽失敗:", err);
                    setIsOnline(false);
                });
                return () => unsubscribe();
            }, []);

            // 提交申請
            const handleApply = (item) => {
                if (item.type === 'spend' && coins < item.value) {
                    alert('金幣不足！');
                    return;
                }
                const newLog = {
                    ...item,
                    logId: Date.now(),
                    status: 'pending',
                    time: new Date().toLocaleTimeString()
                };
                db.collection('app_data').doc('shared').update({
                    logs: [newLog, ...logs]
                });
                alert('已送出申請，請等候審核');
            };

            // 管理員審核
            const handleReview = (logId, isApprove) => {
                const target = logs.find(l => l.logId === logId);
                if (!target) return;

                let newCoins = coins;
                if (isApprove) {
                    newCoins = target.type === 'earn' ? coins + target.value : coins - target.value;
                }

                const newLogs = logs.map(l => 
                    l.logId === logId ? { ...l, status: isApprove ? 'approved' : 'rejected' } : l
                );

                db.collection('app_data').doc('shared').update({
                    coins: newCoins,
                    logs: newLogs
                });
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col">
                    <header className="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-10">
                        <div className="flex items-center gap-2">
                            <Icon name={role === 'admin' ? 'admin' : 'user'} />
                            <span className="font-bold">{role === 'admin' ? '管理者' : '使用者'}</span>
                            <span className={`text-[10px] ${isOnline ? 'text-green-500 cloud-active' : 'text-slate-300'}`}>
                                <Icon name="cloud" className="w-3 h-3" /> {isOnline ? '同步中' : '斷線'}
                            </span>
                        </div>
                        <div className="bg-amber-100 px-3 py-1 rounded-full text-amber-700 font-bold flex items-center gap-1">
                            <Icon name="coins" /> {coins}
                        </div>
                    </header>

                    <main className="p-4 flex-1">
                        {role === 'user' ? (
                            <div className="space-y-4">
                                <div className="flex gap-2">
                                    <button onClick={() => setActiveTab('tasks')} className={`flex-1 py-2 rounded-xl font-bold ${activeTab === 'tasks' ? 'bg-blue-600 text-white' : 'bg-slate-200'}`}>任務</button>
                                    <button onClick={() => setActiveTab('shop')} className={`flex-1 py-2 rounded-xl font-bold ${activeTab === 'shop' ? 'bg-purple-600 text-white' : 'bg-slate-200'}`}>兌換</button>
                                    <button onClick={() => setActiveTab('history')} className={`flex-1 py-2 rounded-xl font-bold ${activeTab === 'history' ? 'bg-slate-800 text-white' : 'bg-slate-200'}`}>紀錄</button>
                                </div>

                                {activeTab === 'history' ? (
                                    <div className="space-y-2">
                                        {logs.map(log => (
                                            <div key={log.logId} className="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center">
                                                <div>
                                                    <div className="font-bold text-sm">{log.title}</div>
                                                    <div className="text-[10px] text-slate-400">{log.time}</div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-xs font-bold ${log.status === 'approved' ? 'text-green-500' : log.status === 'pending' ? 'text-amber-500' : 'text-red-500'}`}>
                                                        {log.status === 'approved' ? '已通過' : log.status === 'pending' ? '審核中' : '被拒絕'}
                                                    </span>
                                                    <span className="font-black">{log.type === 'earn' ? '+' : '-'}{log.value}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {(activeTab === 'tasks' ? missions : rewards).map(item => (
                                            <div key={item.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                                                <div>
                                                    <div className="font-bold">{item.title}</div>
                                                    <div className="text-sm text-blue-500 font-bold">{item.value} Coins</div>
                                                </div>
                                                <button onClick={() => handleApply(item)} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-sm font-bold">申請</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <h2 className="font-bold text-slate-500 text-sm px-1">待審核清單</h2>
                                {logs.filter(l => l.status === 'pending').length === 0 && <p className="text-center text-slate-400 py-10">目前沒有申請</p>}
                                {logs.filter(l => l.status === 'pending').map(log => (
                                    <div key={log.logId} className="bg-white p-4 rounded-2xl shadow-md border-l-4 border-amber-400">
                                        <div className="flex justify-between items-start mb-3">
                                            <div>
                                                <div className="font-bold">{log.title}</div>
                                                <div className="text-xs text-slate-400">{log.time}</div>
                                            </div>
                                            <div className="text-xl font-black">{log.type === 'earn' ? '+' : '-'}{log.value}</div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => handleReview(log.logId, true)} className="flex-1 bg-green-500 text-white py-2 rounded-xl font-bold">准許</button>
                                            <button onClick={() => handleReview(log.logId, false)} className="flex-1 bg-red-500 text-white py-2 rounded-xl font-bold">駁回</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="p-4 bg-white border-t flex gap-4 sticky bottom-0">
                        <button 
                            onClick={() => {
                                if (role === 'user') {
                                    const pw = prompt('請輸入管理密碼:');
                                    if (pw === '8888') setRole('admin');
                                    else if (pw !== null) alert('密碼錯誤');
                                } else {
                                    setRole('user');
                                }
                            }}
                            className="w-full py-3 rounded-2xl bg-slate-100 text-slate-600 font-bold text-sm"
                        >
                            {role === 'user' ? '切換管理者模式' : '切換回執行者模式'}
                        </button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
