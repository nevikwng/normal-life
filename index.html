<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>任務獎勵系統 - 正式連線版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseLib = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .sync-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* 🔑 Firebase 設定區塊 */
        const MANUAL_CONFIG = {
            apiKey: "AIzaSyAPvfBNFtj4FEtMlF-fnn9oet5iGMi0z-w",
            authDomain: "normal-life-f46f8.firebaseapp.com",
            projectId: "normal-life-f46f8",
            storageBucket: "normal-life-f46f8.firebasestorage.app",
            messagingSenderId: "1039652755711",
            appId: "1:1039652755711:web:22ca73482a0aa3ba2e54ca"
        };

        const Icons = {
            Cloud: ({ active, status }) => (
                <div className="flex items-center gap-1.5 px-2 py-1 rounded-md bg-slate-100 border border-slate-200">
                    <div className={`w-2 h-2 rounded-full ${active ? 'bg-green-500 sync-pulse' : 'bg-red-400'}`}></div>
                    <span className="text-[9px] font-bold text-slate-500 uppercase">
                        {status}
                    </span>
                </div>
            ),
            Coins: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/></svg>,
            Trophy: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            ShoppingBag: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
            History: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        };

        const App = () => {
            const [role, setRole] = useState('user');
            const [activeTab, setActiveTab] = useState('tasks');
            const [isCloudSynced, setIsCloudSynced] = useState(false);
            const [syncStatus, setSyncStatus] = useState('Starting...');
            
            const [coins, setCoins] = useState(0);
            const [missions, setMissions] = useState([]);
            const [rewards, setRewards] = useState([]);
            const [logs, setLogs] = useState([]);

            // 新增功能狀態
            const [showAddModal, setShowAddModal] = useState(false);
            const [newItemTitle, setNewItemTitle] = useState('');
            const [newItemValue, setNewItemValue] = useState('');

            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const dbRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, onSnapshot, setDoc } = window.FirebaseLib;
                    
                    try {
                        const config = MANUAL_CONFIG;

                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        const appId = config.projectId;

                        await signInAnonymously(auth);

                        onAuthStateChanged(auth, (user) => {
                            if (user) {
                                const path = doc(db, 'artifacts', appId, 'public', 'data', 'state', 'main');
                                dbRef.current = path;

                                onSnapshot(path, (snap) => {
                                    if (snap.exists()) {
                                        const d = snap.data();
                                        setCoins(d.coins || 0);
                                        setMissions(d.missions || []);
                                        setRewards(d.rewards || []);
                                        setLogs(d.logs || []);
                                        setIsCloudSynced(true);
                                        setSyncStatus('Live');
                                    } else {
                                        setSyncStatus('Creating Data...');
                                        setDoc(path, { 
                                            coins: 100, 
                                            missions: [
                                                { id: 1, title: '完成今日運動', value: 20, type: 'earn' },
                                                { id: 2, title: '閱讀 10 頁書', value: 10, type: 'earn' }
                                            ], 
                                            rewards: [
                                                { id: 101, title: '看一集影集', value: 50, type: 'spend' }
                                            ], 
                                            logs: [] 
                                        }).catch(e => {
                                            console.error("SetDoc Error:", e);
                                            setSyncStatus('Permission Denied');
                                        });
                                    }
                                }, (err) => {
                                    console.error("Firestore Error:", err);
                                    setSyncStatus('Permission Denied');
                                    setIsCloudSynced(false);
                                });
                            }
                        });
                    } catch (err) {
                        console.error("Init Error:", err);
                        setSyncStatus('Init Failed');
                    }
                };
                init();
            }, []);

            const updateCloud = async (data) => {
                if (!dbRef.current) return;
                const { updateDoc } = window.FirebaseLib;
                try {
                    await updateDoc(dbRef.current, data);
                } catch (e) {
                    console.error("Save failed", e);
                }
            };

            const addNewItem = async () => {
                if (!newItemTitle || !newItemValue) return;
                const newItem = {
                    id: Date.now(),
                    title: newItemTitle,
                    value: parseInt(newItemValue),
                    type: activeTab === 'tasks' ? 'earn' : 'spend'
                };

                if (activeTab === 'tasks') {
                    await updateCloud({ missions: [newItem, ...missions] });
                } else {
                    await updateCloud({ rewards: [newItem, ...rewards] });
                }

                setNewItemTitle('');
                setNewItemValue('');
                setShowAddModal(false);
            };

            const deleteItem = async (id, type) => {
                if (type === 'earn') {
                    await updateCloud({ missions: missions.filter(m => m.id !== id) });
                } else {
                    await updateCloud({ rewards: rewards.filter(r => r.id !== id) });
                }
            };

            const submitRequest = async (item) => {
                if (item.type === 'spend' && coins < item.value) {
                    alert('點數不足！');
                    return;
                }
                const newLog = { ...item, logId: Date.now(), status: 'pending', timestamp: new Date().toLocaleString() };
                const newMissions = item.type === 'earn' ? missions.filter(m => m.id !== item.id) : missions;
                await updateCloud({ logs: [newLog, ...logs], missions: newMissions });
            };

            const processReview = async (logId, action) => {
                const target = logs.find(l => l.logId === logId);
                if (!target) return;
                let nextCoins = coins;
                let nextMissions = [...missions];
                if (action === 'approve') {
                    nextCoins = target.type === 'earn' ? coins + target.value : coins - target.value;
                } else {
                    if (target.type === 'earn') nextMissions = [{id: target.id, title: target.title, value: target.value, type: 'earn'}, ...missions];
                }
                const nextLogs = logs.map(l => l.logId === logId ? {...l, status: action === 'approve' ? 'approved' : 'rejected'} : l);
                await updateCloud({ coins: nextCoins, logs: nextLogs, missions: nextMissions });
            };

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-white/80 backdrop-blur-md sticky top-0 z-40 px-6 py-4 flex justify-between items-center border-b">
                        <div>
                            <h1 className="font-black text-slate-800 text-lg text-indigo-600 tracking-tighter">MISSION APP</h1>
                            <Icons.Cloud active={isCloudSynced} status={syncStatus} />
                        </div>
                        <div className="flex items-center gap-2 bg-amber-100 px-4 py-2 rounded-2xl">
                            <Icons.Coins />
                            <span className="font-black text-amber-700 text-xl">{coins}</span>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-4">
                        <div className="flex bg-slate-200 p-1 rounded-2xl">
                            <button onClick={()=>setActiveTab('tasks')} className={`flex-1 py-2 rounded-xl flex items-center justify-center gap-2 font-bold transition-all ${activeTab==='tasks'?'bg-white shadow-sm':'text-slate-500'}`}><Icons.Trophy /> 任務</button>
                            <button onClick={()=>setActiveTab('shop')} className={`flex-1 py-2 rounded-xl flex items-center justify-center gap-2 font-bold transition-all ${activeTab==='shop'?'bg-white shadow-sm':'text-slate-500'}`}><Icons.ShoppingBag /> 商店</button>
                            <button onClick={()=>setActiveTab('logs')} className={`flex-1 py-2 rounded-xl flex items-center justify-center gap-2 font-bold transition-all ${activeTab==='logs'?'bg-white shadow-sm':'text-slate-500'}`}><Icons.History /> 紀錄</button>
                        </div>

                        {/* 新增按鈕 */}
                        {role === 'user' && (activeTab === 'tasks' || activeTab === 'shop') && (
                            <button 
                                onClick={() => setShowAddModal(true)}
                                className="w-full py-3 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 flex items-center justify-center gap-2 hover:bg-slate-100 transition-colors font-medium text-sm"
                            >
                                <Icons.Plus /> 新增自定義{activeTab === 'tasks' ? '任務' : '商品'}
                            </button>
                        )}

                        {role === 'user' && activeTab === 'tasks' && (
                            <div className="space-y-3">
                                {missions.map(m => (
                                    <div key={m.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm group">
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <p className="font-bold">{m.title}</p>
                                                <button onClick={() => deleteItem(m.id, 'earn')} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-400 p-1"><Icons.Trash /></button>
                                            </div>
                                            <p className="text-blue-500 text-xs font-black">+{m.value} pt</p>
                                        </div>
                                        <button onClick={()=>submitRequest(m)} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition-transform">回報完成</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {role === 'user' && activeTab === 'shop' && (
                            <div className="space-y-3">
                                {rewards.map(r => (
                                    <div key={r.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm group">
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <p className="font-bold">{r.title}</p>
                                                <button onClick={() => deleteItem(r.id, 'spend')} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-400 p-1"><Icons.Trash /></button>
                                            </div>
                                            <p className="text-purple-500 text-xs font-black">-{r.value} pt</p>
                                        </div>
                                        <button 
                                            onClick={()=>submitRequest(r)} 
                                            disabled={coins < r.value}
                                            className={`px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition-transform ${coins >= r.value ? 'bg-purple-600 text-white' : 'bg-slate-100 text-slate-400'}`}
                                        >
                                            申請兌換
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {role === 'user' && activeTab === 'logs' && (
                            <div className="space-y-2">
                                {logs.map(log => (
                                    <div key={log.logId} className="bg-white/50 p-3 rounded-xl border border-slate-100 flex justify-between items-center text-sm">
                                        <div>
                                            <p className="font-medium text-slate-700">{log.title}</p>
                                            <p className="text-[10px] text-slate-400">{log.timestamp}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className={`font-bold ${log.status === 'approved' ? 'text-green-500' : log.status === 'rejected' ? 'text-red-400' : 'text-amber-500 animate-pulse'}`}>
                                                {log.status === 'approved' ? '已核准' : log.status === 'rejected' ? '被駁回' : '審核中'}
                                            </p>
                                            <p className="text-[10px] font-mono font-bold text-slate-400">{log.type === 'earn' ? '+' : '-'}{log.value}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {role === 'admin' && (
                            <div className="space-y-4">
                                <p className="text-xs font-bold text-indigo-500 px-2 uppercase tracking-widest flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></span>
                                    待審核申請
                                </p>
                                {logs.filter(l=>l.status==='pending').map(log => (
                                    <div key={log.logId} className="bg-white p-5 rounded-3xl border-2 border-slate-100 shadow-xl shadow-slate-200/50">
                                        <div className="flex justify-between items-start mb-4">
                                            <div><h3 className="font-bold text-lg">{log.title}</h3><p className="text-xs text-slate-400">{log.timestamp}</p></div>
                                            <span className={`text-xl font-black ${log.type==='earn'?'text-blue-600':'text-purple-600'}`}>{log.type==='earn'?'+':'-'}{log.value}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={()=>processReview(log.logId, 'approve')} className="flex-1 bg-green-500 text-white py-3 rounded-2xl font-bold active:scale-95 transition-transform">批准</button>
                                            <button onClick={()=>processReview(log.logId, 'reject')} className="flex-1 bg-slate-100 text-slate-500 py-3 rounded-2xl font-bold active:scale-95 transition-transform">駁回</button>
                                        </div>
                                    </div>
                                ))}
                                {logs.filter(l=>l.status==='pending').length === 0 && isCloudSynced && <p className="text-center py-12 text-slate-400 text-sm">✅ 所有申請已處理完畢</p>}
                            </div>
                        )}
                    </main>

                    {/* 新增選項 Modal */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs shadow-2xl">
                                <h2 className="text-center font-bold mb-4 text-slate-800">新增{activeTab === 'tasks' ? '任務' : '商品'}</h2>
                                <div className="space-y-4">
                                    <input 
                                        type="text" 
                                        placeholder="輸入名稱 (如: 運動)" 
                                        className="w-full bg-slate-100 p-4 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium" 
                                        value={newItemTitle} 
                                        onChange={(e)=>setNewItemTitle(e.target.value)}
                                    />
                                    <input 
                                        type="number" 
                                        placeholder="點數點數 (如: 50)" 
                                        className="w-full bg-slate-100 p-4 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold" 
                                        value={newItemValue} 
                                        onChange={(e)=>setNewItemValue(e.target.value)}
                                    />
                                    <button onClick={addNewItem} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg shadow-slate-200">建立項目</button>
                                    <button onClick={()=>setShowAddModal(false)} className="w-full text-slate-400 py-2 text-sm">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 底部角色切換列 */}
                    <div className="fixed bottom-6 left-4 right-4 max-w-md mx-auto">
                        <div className={`p-4 rounded-3xl flex justify-between items-center text-white shadow-2xl transition-all duration-500 ${role === 'admin' ? 'bg-indigo-900 border-indigo-700' : 'bg-slate-900 border-slate-700'}`}>
                           <div className="flex items-center gap-3">
                               <div className="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-inner"><Icons.User/></div>
                           </div>
                           <button onClick={()=>role==='user'?setShowPasswordModal(true):setRole('user')} className="bg-white text-slate-900 px-6 py-2.5 rounded-2xl font-bold text-xs active:scale-90 shadow-lg">切換身分</button>
                        </div>
                    </div>

                    {showPasswordModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xs shadow-2xl">
                                <p className="text-center font-bold mb-2 text-slate-800">身分驗證</p>
                                <input type="password" autoFocus className="w-full bg-slate-100 py-5 text-center text-3xl font-black rounded-2xl mb-6 tracking-[0.5em] outline-none" value={passwordInput} onChange={(e)=>setPasswordInput(e.target.value)} maxLength={4} />
                                <button onClick={()=>{if(passwordInput==='8888'){setRole('admin');setShowPasswordModal(false);setPasswordInput('');}else{alert('密碼錯誤');}}} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">確認</button>
                                <button onClick={()=>setShowPasswordModal(false)} className="w-full text-slate-400 py-3 text-sm mt-2">取消</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
